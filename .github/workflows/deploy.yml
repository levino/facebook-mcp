name: Deploy

# Bundles the edge script and deploys it to Bunny Edge Scripting on every push
# to main. Configure these repository secrets first:
#   BUNNY_SCRIPT_ID   - the ScriptID of the Bunny Edge Script / pull zone
#   BUNNY_DEPLOY_KEY  - a deploy key generated for that script
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type check
        run: deno task check

      - name: Test
        run: deno task test

      - name: Bundle
        run: deno task build

      - name: Deploy to Bunny Edge Scripting
        uses: BunnyWay/actions/deploy-script@main
        with:
          script_id: ${{ secrets.BUNNY_SCRIPT_ID }}
          deploy_key: ${{ secrets.BUNNY_DEPLOY_KEY }}
          file: dist/main.js
